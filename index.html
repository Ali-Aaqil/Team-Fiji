<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Team Database</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2f4f4f;
            color: #fff;
        }
        .profile-container {
            width: 90%;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            background-color: #1a2b2f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            color: #fff;
        }
        th {
            background-color: #006400;
            font-size: 14px;
        }
        td {
            font-size: 12px;
        }
        .button {
            background-color: #8b0000;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #b22222;
        }
        tr:hover {
            background-color: #555;
        }
        .add-player-form {
            margin-bottom: 20px;
        }
        .add-player-form input {
            margin-right: 10px;
            padding: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <h2>Labasa FC Roster</h2>
        <div class="add-player-form">
            <input type="text" id="playerName" placeholder="Name" required>
            <input type="number" id="playerAge" placeholder="Age" required>
            <input type="text" id="playerPosition" placeholder="Position" required>
            <input type="text" id="playerTeam" placeholder="Team" required>
            <button class="button" onclick="addPlayer()">Add Player</button>
        </div>

        <table id="teamTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Position</th>
                    <th>Team</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Team data will be inserted here -->
            </tbody>
        </table>
    </div>

    <!-- Link to the external JavaScript file -->
    <script src="project.js"></script>
</body>
</html>
